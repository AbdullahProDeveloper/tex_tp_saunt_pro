<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#667eea">
  <meta name="format-detection" content="telephone=no">
  <title>LinguaVox Pro | মোবাইল টেক্সট টু স্পিচ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --primary-light: #7c9bff;
      --secondary: #f687b3;
      --success: #48bb78;
      --warning: #ed8936;
      --error: #f56565;
      --dark: #1a202c;
      --light: #f7fafc;
      --gray: #4a5568;
      --gray-light: #e2e8f0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Mobile Container */
    .mobile-container {
      max-width: 100%;
      min-height: 100vh;
      position: relative;
    }

    /* Auth Container - Mobile Optimized */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    /* Main App Container - Mobile First */
    .app-container {
      display: none;
      padding: 16px;
      padding-bottom: 80px;
    }

    .app-container.active {
      display: block;
    }

    /* Mobile Header */
    .mobile-header {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .logo-mobile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon-mobile {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
    }

    .logo-text-mobile h2 {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text-mobile p {
      font-size: 10px;
      color: var(--gray);
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-light);
      padding: 6px 12px;
      border-radius: 30px;
    }

    /* Stats Grid - Mobile Responsive */
    .stats-grid-mobile {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card-mobile {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-number-mobile {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label-mobile {
      font-size: 10px;
      color: var(--gray);
      margin-top: 4px;
    }

    /* Card - Mobile Optimized */
    .card-mobile {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .card-title-mobile {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Text Area - Mobile */
    .textarea-mobile {
      width: 100%;
      min-height: 150px;
      padding: 14px;
      border: 2px solid var(--gray-light);
      border-radius: 20px;
      font-family: 'Inter', monospace;
      font-size: 15px;
      line-height: 1.5;
      resize: vertical;
      background: white;
    }

    /* Toolbar - Scrollable */
    .toolbar-scroll {
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 14px;
    }

    .toolbar-scroll::-webkit-scrollbar {
      display: none;
    }

    .toolbar-mobile {
      display: flex;
      gap: 8px;
      padding: 4px;
    }

    .tool-btn-mobile {
      padding: 8px 14px;
      background: var(--gray-light);
      border: none;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
    }

    /* Sliders - Mobile */
    .slider-group-mobile {
      margin-bottom: 16px;
    }

    .slider-header-mobile {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: var(--gray-light);
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
    }

    /* Playback Buttons - Mobile Grid */
    .playback-grid-mobile {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 16px 0;
    }

    .playback-btn-mobile {
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: var(--gray-light);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .playback-btn-mobile.primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    /* Voice Grid - Mobile */
    .voice-grid-mobile {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-height: 250px;
      overflow-y: auto;
    }

    .voice-card-mobile {
      background: var(--gray-light);
      padding: 12px;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      font-size: 12px;
    }

    .voice-card-mobile.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    /* History List - Mobile */
    .history-list-mobile {
      max-height: 350px;
      overflow-y: auto;
    }

    .history-item-mobile {
      background: var(--gray-light);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .history-content-mobile {
      padding: 12px;
    }

    .history-text-mobile {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-meta-mobile {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--gray);
    }

    .history-actions-mobile {
      display: flex;
      gap: 6px;
      padding: 10px;
      background: rgba(0,0,0,0.05);
    }

    /* Bottom Status Bar - Fixed on Mobile */
    .bottom-status-mobile {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-size: 12px;
      z-index: 100;
    }

    /* Action Buttons Grid */
    .action-grid-mobile {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    /* Modal - Mobile */
    .modal-mobile {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-mobile.active {
      display: flex;
    }

    .modal-content-mobile {
      background: white;
      border-radius: 28px;
      padding: 24px;
      width: 100%;
      max-width: 320px;
    }

    /* Toast - Mobile */
    .toast-mobile {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: rgba(0,0,0,0.9);
      border-radius: 60px;
      padding: 12px 20px;
      color: white;
      text-align: center;
      font-size: 13px;
      z-index: 2000;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Wave Animation */
    .wave-group-mobile {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .wave-mobile {
      width: 3px;
      height: 16px;
      background: white;
      border-radius: 2px;
      animation: waveAnim 0.8s infinite;
    }

    @keyframes waveAnim {
      0%, 100% { height: 8px; }
      50% { height: 16px; }
    }

    /* Input Fields */
    .input-mobile {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--gray-light);
      border-radius: 16px;
      font-size: 15px;
      margin-bottom: 12px;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--gray-light);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="mobile-container">
  <!-- Auth Section -->
  <div id="authSection" class="auth-container">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 24px;">
        <div style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px;">
          <i class="fas fa-microphone-alt" style="font-size: 32px; color: white;"></i>

  <!-- Main App -->

<script>
  // User Authentication System
  class AuthSystem {
    constructor() {
      this.users = this.loadUsers();
      this.currentUser = null;
    }

    loadUsers() {
      const users = localStorage.getItem('linguvox_users_mobile');
      return users ? JSON.parse(users) : [];
    }

    saveUsers() {
      localStorage.setItem('linguvox_users_mobile', JSON.stringify(this.users));
    }

    register(name, email, password) {
      if (this.users.find(u => u.email === email)) {
        return { success: false, message: 'Email already exists!' };
      }
      if (password.length < 6) {
        return { success: false, message: 'Password must be at least 6 characters!' };
      }
      const newUser = {
        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        name: name,
        email: email,
        password: btoa(password),
        createdAt: new Date().toISOString()
      };
      this.users.push(newUser);
      this.saveUsers();
      this.createUserDatabase(newUser.id);
      return { success: true, message: 'Account created successfully!' };
    }

    login(email, password) {
      const user = this.users.find(u => u.email === email && atob(u.password) === password);
      if (user) {
        this.currentUser = user;
        localStorage.setItem('linguvox_current_user_mobile', JSON.stringify(user));
        return { success: true, user: user };
      }
      return { success: false, message: 'Invalid email or password!' };
    }

    logout() {
      this.currentUser = null;
      localStorage.removeItem('linguvox_current_user_mobile');
    }

    checkAutoLogin() {
      const savedUser = localStorage.getItem('linguvox_current_user_mobile');
      if (savedUser) {
        this.currentUser = JSON.parse(savedUser);
        return this.currentUser;
      }
      return null;
    }

    createUserDatabase(userId) {
      const userDataKey = `linguvox_data_mobile_${userId}`;
      if (!localStorage.getItem(userDataKey)) {
        localStorage.setItem(userDataKey, JSON.stringify([]));
      }
    }

    getUserData() {
      if (!this.currentUser) return [];
      const userDataKey = `linguvox_data_mobile_${this.currentUser.id}`;
      const data = localStorage.getItem(userDataKey);
      return data ? JSON.parse(data) : [];
    }

    saveUserData(data) {
      if (!this.currentUser) return;
      const userDataKey = `linguvox_data_mobile_${this.currentUser.id}`;
      localStorage.setItem(userDataKey, JSON.stringify(data));
    }

    addHistoryItem(item) {
      const history = this.getUserData();
      const newItem = {
        id: Date.now(),
        ...item,
        userId: this.currentUser.id,
        userEmail: this.currentUser.email,
        timestamp: Date.now()
      };
      history.unshift(newItem);
      this.saveUserData(history);
      return newItem;
    }

    deleteHistoryItem(id) {
      let history = this.getUserData();
      history = history.filter(i => i.id !== id);
      this.saveUserData(history);
      return true;
    }

    clearAllHistory() {
      this.saveUserData([]);
    }
  }

  // Main Application
  class LinguaVoxPro {
    constructor() {
      this.auth = new AuthSystem();
      this.synth = window.speechSynthesis;
      this.currentUtterance = null;
      this.voices = [];
      this.selectedVoice = null;
      this.history = [];
      this.init();
    }

    init() {
      this.checkAuth();
      this.bindAuthEvents();
      this.bindAppEvents();
    }

    checkAuth() {
      const user = this.auth.checkAutoLogin();
      if (user) {
        this.showApp(user);
      } else {
        this.showAuth();
      }
    }

    showAuth() {
      document.getElementById('authSection').style.display = 'flex';
      document.getElementById('appContainer').classList.remove('active');
    }

    showApp(user) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('appContainer').classList.add('active');
      document.getElementById('userNameDisplay').textContent = user.name.split(' ')[0];
      this.loadUserData();
      this.loadVoices();
      this.loadSavedText();
      this.updateStats();
      this.setupAutoSave();
      this.setupAutoExpandTextarea();
    }

    loadUserData() {
      this.history = this.auth.getUserData();
      this.renderHistory();
    }

    bindAuthEvents() {
      document.getElementById('loginBtn').addEventListener('click', () => this.login());
      document.getElementById('registerBtn').addEventListener('click', () => this.register());
      document.getElementById('showRegister').addEventListener('click', () => this.toggleAuthForms('register'));
      document.getElementById('showLogin').addEventListener('click', () => this.toggleAuthForms('login'));
      document.getElementById('logoutBtn').addEventListener('click', () => this.logout());
    }

    login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        this.showToast('Please fill all fields', 'error');
        return;
      }
      const result = this.auth.login(email, password);
      if (result.success) {
        this.showToast('Login successful!', 'success');
        this.showApp(result.user);
      } else {
        this.showToast(result.message, 'error');
      }
    }

    register() {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;
      if (!name || !email || !password) {
        this.showToast('Please fill all fields', 'error');
        return;
      }
      if (password !== confirm) {
        this.showToast('Passwords do not match!', 'error');
        return;
      }
      const result = this.auth.register(name, email, password);
      if (result.success) {
        this.showToast(result.message, 'success');
        this.toggleAuthForms('login');
        document.getElementById('loginEmail').value = email;
      } else {
        this.showToast(result.message, 'error');
      }
    }

    logout() {
      this.auth.logout();
      this.showAuth();
      this.showToast('Logged out successfully', 'success');
    }

    toggleAuthForms(type) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      if (type === 'register') {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
      } else {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      }
    }

    bindAppEvents() {
      document.getElementById('textInput').addEventListener('input', () => {
        this.updateStats();
        this.saveCurrentText();
      });
      document.getElementById('speakBtn').addEventListener('click', () => this.speak());
      document.getElementById('pauseBtn').addEventListener('click', () => this.pause());
      document.getElementById('resumeBtn').addEventListener('click', () => this.resume());
      document.getElementById('stopBtn').addEventListener('click', () => this.stop());
      document.getElementById('copyBtn').addEventListener('click', () => this.copyText());
      document.getElementById('exportTxtBtn').addEventListener('click', () => this.exportText());
      document.getElementById('clearBtn').addEventListener('click', () => this.clearText());
      document.getElementById('downloadAudioBtn').addEventListener('click', () => this.downloadAudio());
      document.getElementById('saveCurrentBtn').addEventListener('click', () => this.saveToHistory());
      document.getElementById('exportAllHistoryBtn').addEventListener('click', () => this.exportAllHistory());
      document.getElementById('clearHistoryBtn').addEventListener('click', () => this.clearAllHistory());
      document.getElementById('boldBtn').addEventListener('click', () => this.formatText('bold'));
      document.getElementById('italicBtn').addEventListener('click', () => this.formatText('italic'));
      document.getElementById('clearFormatBtn').addEventListener('click', () => this.clearFormat());
      document.getElementById('wordAnalysisBtn').addEventListener('click', () => this.wordAnalysis());
      document.getElementById('rateControl').addEventListener('input', (e) => {
        document.getElementById('rateValue').textContent = e.target.value + 'x';
      });
      document.getElementById('pitchControl').addEventListener('input', (e) => {
        document.getElementById('pitchValue').textContent = e.target.value;
      });
      document.getElementById('volumeControl').addEventListener('input', (e) => {
        document.getElementById('volumeValue').textContent = Math.round(e.target.value * 100) + '%';
      });
    }

    updateStats() {
      const text = document.getElementById('textInput').value;
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const lines = text.split(/\n/).length;
      const readTime = Math.ceil(words / 200);
      document.getElementById('statChars').textContent = chars;
      document.getElementById('statWords').textContent = words;
      document.getElementById('statLines').textContent = lines;
      document.getElementById('statTime').textContent = readTime;
    }

    setupAutoExpandTextarea() {
      const textarea = document.getElementById('textInput');
      const expand = () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 300) + 'px';
      };
      textarea.addEventListener('input', expand);
      expand();
    }

    loadVoices() {
      const load = () => {
        this.voices = this.synth.getVoices();
        if (this.voices.length === 0) {
          setTimeout(load, 100);
          return;
        }
        this.renderVoices();
      };
      load();
      if (this.synth.onvoiceschanged !== undefined) {
        this.synth.onvoiceschanged = load;
      }
    }

    renderVoices() {
      const container = document.getElementById('voiceGrid');
      container.innerHTML = '';
      const unique = new Map();
      this.voices.forEach(voice => {
        if (!unique.has(voice.lang)) {
          unique.set(voice.lang, voice);
        }
      });
      Array.from(unique.values()).slice(0, 6).forEach(voice => {
        const voiceCard = document.createElement('div');
        voiceCard.className = 'voice-card-mobile';
        voiceCard.innerHTML = `
          <div><i class="fas fa-user"></i> ${voice.name.split(' ')[0]}</div>
          <div style="font-size: 10px;">${voice.lang}</div>
        `;
        voiceCard.addEventListener('click', () => {
          this.selectedVoice = voice;
          document.querySelectorAll('.voice-card-mobile').forEach(v => v.classList.remove('active'));
          voiceCard.classList.add('active');
          this.showToast(`${voice.name} selected`, 'success');
        });
        container.appendChild(voiceCard);
      });
    }

    speak() {
      const text = document.getElementById('textInput').value;
      if (!text.trim()) {
        this.showToast('Please enter some text', 'error');
        return;
      }
      this.stop();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = parseFloat(document.getElementById('rateControl').value);
      utterance.pitch = parseFloat(document.getElementById('pitchControl').value);
      utterance.volume = parseFloat(document.getElementById('volumeControl').value);
      if (this.selectedVoice) {
        utterance.voice = this.selectedVoice;
      } else {
        utterance.lang = this.detectLanguage(text);
      }
      utterance.onstart = () => {
        document.getElementById('waveGroup').style.display = 'flex';
        document.getElementById('statusMessage').textContent = '🔊 Speaking...';
      };
      utterance.onend = () => {
        document.getElementById('waveGroup').style.display = 'none';
        document.getElementById('statusMessage').textContent = '✅ Completed';
      };
      utterance.onerror = () => {
        document.getElementById('waveGroup').style.display = 'none';
        document.getElementById('statusMessage').textContent = '❌ Error';
      };
      this.currentUtterance = utterance;
      this.synth.speak(utterance);
    }

    detectLanguage(text) {
      if (/[\u0600-\u06FF]/.test(text)) return 'ar-SA';
      if (/[\u0980-\u09FF]/.test(text)) return 'bn-BD';
      if (/[\u0900-\u097F]/.test(text)) return 'hi-IN';
      return 'en-US';
    }

    pause() {
      if (this.synth.speaking && !this.synth.paused) {
        this.synth.pause();
        document.getElementById('statusMessage').textContent = '⏸ Paused';
      }
    }

    resume() {
      if (this.synth.paused) {
        this.synth.resume();
        document.getElementById('statusMessage').textContent = '▶️ Resumed';
      }
    }

    stop() {
      if (this.synth.speaking) {
        this.synth.cancel();
        document.getElementById('waveGroup').style.display = 'none';
        document.getElementById('statusMessage').textContent = '⏹ Stopped';
      }
    }

    downloadAudio() {
      this.showToast('Audio recording - Premium feature', 'info');
    }

    copyText() {
      const text = document.getElementById('textInput').value;
      navigator.clipboard.writeText(text);
      this.showToast('Copied to clipboard', 'success');
    }

    exportText() {
      const text = document.getElementById('textInput').value;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `linguvox_${Date.now()}.txt`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('Exported as TXT', 'success');
    }

    clearText() {
      if (confirm('Clear all text?')) {
        document.getElementById('textInput').value = '';
        this.updateStats();
        this.showToast('Text cleared', 'info');
      }
    }

    saveToHistory() {
      const text = document.getElementById('textInput').value;
      if (!text.trim()) {
        this.showToast('Nothing to save', 'error');
        return;
      }
      this.auth.addHistoryItem({
        text: text.substring(0, 80),
        fullText: text,
        date: new Date().toISOString(),
        stats: { chars: text.length, words: text.trim().split(/\s+/).length }
      });
      this.loadUserData();
      this.showToast('Saved to cloud', 'success');
    }

    renderHistory() {
      const container = document.getElementById('historyList');
      if (!container) return;
      if (this.history.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 30px; color: var(--gray);"><i class="fas fa-inbox"></i><br>No history</div>';
        return;
      }
      container.innerHTML = '';
      this.history.forEach(item => {
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item-mobile';
        historyItem.innerHTML = `
          <div class="history-content-mobile">
            <div class="history-text-mobile">${this.escapeHtml(item.text)}</div>
            <div class="history-meta-mobile">
              <span>${new Date(item.date).toLocaleDateString()}</span>
              <span>${item.stats.chars} chars</span>
            </div>
          </div>
          <div class="history-actions-mobile">
            <button class="tool-btn-mobile load-item" data-id="${item.id}" style="flex: 1;"><i class="fas fa-folder-open"></i> Load</button>
            <button class="tool-btn-mobile delete-item" data-id="${item.id}" style="flex: 1; background: var(--error); color: white;"><i class="fas fa-trash"></i> Delete</button>
          </div>
        `;
        historyItem.querySelector('.load-item').addEventListener('click', () => {
          document.getElementById('textInput').value = item.fullText;
          this.updateStats();
          this.showToast('Loaded', 'success');
        });
        historyItem.querySelector('.delete-item').addEventListener('click', () => {
          if (confirm('Delete this item?')) {
            this.auth.deleteHistoryItem(item.id);
            this.loadUserData();
            this.showToast('Deleted', 'success');
          }
        });
        container.appendChild(historyItem);
      });
    }

    exportAllHistory() {
      if (this.history.length === 0) {
        this.showToast('No history to export', 'error');
        return;
      }
      const blob = new Blob([JSON.stringify(this.history, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `linguvox_history_${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('History exported', 'success');
    }

    clearAllHistory() {
      if (confirm('Delete ALL history?')) {
        this.auth.clearAllHistory();
        this.loadUserData();
        this.showToast('All history cleared', 'success');
      }
    }

    formatText(command) {
      const textarea = document.getElementById('textInput');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const selected = textarea.value.substring(start, end);
      if (selected) {
        const formatted = command === 'bold' ? `**${selected}**` : `*${selected}*`;
        const newText = textarea.value.substring(0, start) + formatted + textarea.value.substring(end);
        textarea.value = newText;
        this.updateStats();
      }
    }

    clearFormat() {
      const text = document.getElementById('textInput').value;
      const cleaned = text.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');
      document.getElementById('textInput').value = cleaned;
      this.updateStats();
      this.showToast('Formatting cleared', 'success');
    }

    wordAnalysis() {
      const text = document.getElementById('textInput').value;
      const words = text.toLowerCase().match(/[\w\u0980-\u09FF]+/g) || [];
      const freq = {};
      words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
      const top = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 5);
      let msg = 'Top 5 Words:\n';
      top.forEach(([w,c]) => msg += `${w}: ${c}\n`);
      alert(msg);
    }

    setupAutoSave() {
      setInterval(() => this.saveCurrentText(), 30000);
    }

    loadSavedText() {
      const user = this.auth.currentUser;
      if (user) {
        const saved = localStorage.getItem(`linguvox_text_mobile_${user.id}`);
        if (saved) {
          document.getElementById('textInput').value = saved;
          this.updateStats();
        }
      }
    }

    saveCurrentText() {
      const user = this.auth.currentUser;
      if (user) {
        const text = document.getElementById('textInput').value;
        localStorage.setItem(`linguvox_text_mobile_${user.id}`, text);
      }
    }

    showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = 'toast-mobile';
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  }

  const app = new LinguaVoxPro();
</script>
</body>
</html>
